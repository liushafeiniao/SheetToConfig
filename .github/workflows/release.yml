name: Build and Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      build_unsigned_macos:
        description: Build unsigned macOS artifacts for internal maintainer preview only
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONUTF8: "1"
  QT_QPA_PLATFORM: offscreen

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
    steps:
      # actions/checkout v4.4.0
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && 'refs/heads/main' || github.ref }}
          fetch-depth: 0
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Validate version, tag, changelog, and trusted tag ancestry
        id: metadata
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_EVENT_NAME}" == "push" ]]; then
            git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
            tag_commit="$(git rev-list -n 1 "${GITHUB_REF}")"
            checkout_commit="$(git rev-parse HEAD)"
            main_commit="$(git rev-parse origin/main)"
            test "${tag_commit}" = "${checkout_commit}"
            test "${tag_commit}" = "${main_commit}"
            python scripts/check_release.py --tag "${GITHUB_REF_NAME}"
          else
            python scripts/check_release.py --self-check
          fi

  test:
    name: Test (${{ matrix.name }})
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            runner: windows-latest
          - name: macOS Apple Silicon
            runner: macos-15
          - name: macOS Intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    steps:
      # actions/checkout v4.4.0
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -r requirements.txt
      - name: Compile Python sources
        run: python -m compileall -q SheetToConfig.py sheet_to_config scripts tests
      - name: Run tests
        run: python scripts/run_tests.py

  build-windows-private:
    name: Build private Windows x64 asset
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [validate, test]
    runs-on: windows-latest
    timeout-minutes: 30
    environment: private-release-assets
    permissions:
      contents: read
    steps:
      # actions/checkout v4.4.0
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Inject private donation assets
        env:
          DONATE_ALIPAY_PNG_B64_1: ${{ secrets.DONATE_ALIPAY_PNG_B64_1 }}
          DONATE_ALIPAY_PNG_B64_2: ${{ secrets.DONATE_ALIPAY_PNG_B64_2 }}
          DONATE_WECHAT_PNG_B64_1: ${{ secrets.DONATE_WECHAT_PNG_B64_1 }}
          DONATE_WECHAT_PNG_B64_2: ${{ secrets.DONATE_WECHAT_PNG_B64_2 }}
          DONATE_ALIPAY_PNG_SHA256: ${{ secrets.DONATE_ALIPAY_PNG_SHA256 }}
          DONATE_WECHAT_PNG_SHA256: ${{ secrets.DONATE_WECHAT_PNG_SHA256 }}
        run: python scripts/inject_donation_assets.py --from-env --require
      - name: Build executable
        run: python scripts/build.py
      - name: Prepare and verify exact stable assets
        shell: pwsh
        run: |
          $assetName = "SheetToConfig-v${{ needs.validate.outputs.version }}-windows-x64.exe"
          New-Item -ItemType Directory -Force artifacts | Out-Null
          Copy-Item dist/SheetToConfig.exe "artifacts/$assetName"
          $hash = (Get-FileHash "artifacts/$assetName" -Algorithm SHA256).Hash.ToLowerInvariant()
          $expectedChecksum = "${hash} *${assetName}"
          $expectedChecksum | Set-Content -NoNewline artifacts/SHA256SUMS.txt
          $files = @(Get-ChildItem artifacts -File | Select-Object -ExpandProperty Name | Sort-Object)
          $expected = @($assetName, "SHA256SUMS.txt") | Sort-Object
          if (Compare-Object $files $expected) { throw "Unexpected Windows release assets." }
          if ((Get-Content "artifacts/SHA256SUMS.txt" -Raw) -ne $expectedChecksum) { throw "Invalid checksum file." }
      # actions/upload-artifact v4.6.2
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: windows-release
          path: artifacts
          if-no-files-found: error

  build-macos-preview:
    name: Build unsigned macOS preview (${{ matrix.arch }})
    if: github.event_name == 'workflow_dispatch' && inputs.build_unsigned_macos
    needs: [validate, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    steps:
      # actions/checkout v4.4.0
      - uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: refs/heads/main
      # actions/setup-python v5.6.0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Build app bundle
        run: python scripts/build.py
      - name: Create unsigned internal preview
        shell: bash
        run: |
          mkdir -p artifacts
          python scripts/package_macos.py --app dist/SheetToConfig.app --arch "${{ matrix.arch }}" --version "${{ needs.validate.outputs.version }}" --unsigned --output "artifacts/SheetToConfig-v${{ needs.validate.outputs.version }}-macos-${{ matrix.arch }}-unsigned.dmg"
      # actions/upload-artifact v4.6.2
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: macos-internal-preview-${{ matrix.arch }}
          path: artifacts/*-unsigned.dmg
          if-no-files-found: error

  publish:
    name: Publish Windows stable release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: [validate, build-windows-private]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # actions/download-artifact v4.3.0
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: windows-release
          path: artifacts
      - name: Verify exact stable assets and checksums
        env:
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          expected="SheetToConfig-v${VERSION}-windows-x64.exe"
          actual="$(find artifacts -maxdepth 1 -type f -printf '%f\n' | sort)"
          expected_files="$(printf '%s\n%s\n' "${expected}" "SHA256SUMS.txt" | sort)"
          test "${actual}" = "${expected_files}"
          (
            cd artifacts
            sha256sum --check SHA256SUMS.txt
          )
      - name: Create the exact Windows stable release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          RELEASE_TAG: ${{ needs.validate.outputs.tag }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Release already exists: ${RELEASE_TAG}" >&2
            exit 1
          fi
          gh release create "${RELEASE_TAG}" "artifacts/SheetToConfig-v${VERSION}-windows-x64.exe" artifacts/SHA256SUMS.txt --verify-tag --title "SheetToConfig ${RELEASE_TAG}" --generate-notes
