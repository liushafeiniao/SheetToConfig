  <!-- ============ legend strip ============ -->
  <g id="legend" text-anchor="middle"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif">
    <text x="600" y="332" font-size="14">
      <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Sheet</tspan><tspan fill="#8A9A93"> — 데이터 시트명 &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">File</tspan><tspan fill="#8A9A93"> — 출력 파일명, 확장자가 형식 결정 &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Platform</tspan><tspan fill="#8A9A93"> — c 클라이언트 / s 서버 / cs 양쪽; 헤더 행 생략 가능</tspan>
    </text>
    <text x="600" y="358" font-size="13" fill="#55665E">TypeDefinition.xlsx에 5개 시트가 있으며, 아이템 / 보상을 업무 통합 문서로 복사하면 실행됩니다. itemId는 순수 ID 출력을 위해 고정 int입니다.</text>
  </g>

