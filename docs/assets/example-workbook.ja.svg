  <!-- ============ legend strip ============ -->
  <g id="legend" text-anchor="middle"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif">
    <text x="600" y="332" font-size="14">
      <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Sheet</tspan><tspan fill="#8A9A93"> — データシート名 &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">File</tspan><tspan fill="#8A9A93"> — 出力ファイル名、拡張子が形式を決定 &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Platform</tspan><tspan fill="#8A9A93"> — c クライアント / s サーバー / cs 両端。ヘッダー行は省略可</tspan>
    </text>
    <text x="600" y="358" font-size="13" fill="#55665E">TypeDefinition.xlsx に 5 シートを集約。アイテム / 報酬 を業務ブックにコピーすれば実行可能。itemId は純 ID 出力のため固定 int。</text>
  </g>

