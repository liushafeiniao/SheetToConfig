<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="892" viewBox="0 0 1200 892"
     role="img" aria-labelledby="title desc">
  <title id="title">SheetToConfig サンプルワークブック</title>
  <desc id="desc">サンプル構造：TypeDefinition.xlsx に CODE、Guide、Examples、アイテム、報酬 の 5 シートを集約。アイテム と 報酬 はコピー可能な学習用サンプルで、GameConfig.xlsx にコピーした後、業務用 CODE シートが出力を宣言します。フィールド名は英語キャメルケース固定、型は日本語エイリアス（整数、文字列、品質、アイコンパス、アイテムID、アイテムリスト など）を使い、itemId は固定 int のまま、シート名とフィールド説明は日本語です。</desc>

  <defs>
    <pattern id="cellgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E8F5F0" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="892" rx="24" fill="#0A0F0D"/>
  <rect width="1200" height="892" rx="24" fill="url(#cellgrid)"/>

  <!-- ============ CODE worksheet panel ============ -->
  <g id="code-sheet">
    <rect x="48" y="32" width="560" height="284" rx="12" fill="#111815" stroke="#1F2A26"/>
    <g transform="translate(64 48)">
      <rect width="15" height="15" rx="3" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <path d="M5 0V15 M0 5H15" stroke="#00D4AA" stroke-width="1"/>
    </g>
    <text x="88" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif"
          font-size="16" font-weight="600" fill="#E8F5F0">コピーして実行：GameConfig.xlsx — CODE</text>

    <g stroke="#1F2A26" stroke-width="1">
      <path d="M64 90H534 M64 128H534 M64 166H534 M64 204H534 M64 242H534 M64 280H534"/>
      <path d="M64 90V280 M184 90V280 M414 90V280 M534 90V280"/>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
      <text x="76" y="116" font-size="14" font-weight="600" fill="#8A9A93">Sheet</text>
      <text x="196" y="116" font-size="14" font-weight="600" fill="#8A9A93">File</text>
      <text x="426" y="116" font-size="14" font-weight="600" fill="#8A9A93">Platform</text>
      <g font-size="15" fill="#E8F5F0">
        <text x="76" y="154" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif">アイテム</text>
        <text x="196" y="154">ItemConfig.json</text>
        <text x="76" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif">報酬</text>
        <text x="196" y="192">RewardConfig.json</text>
        <text x="76" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif">ドロップ</text>
        <text x="196" y="230">DropConfig.lua</text>
        <text x="76" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif">クエスト</text>
        <text x="196" y="268">QuestConfig.pb</text>
      </g>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13"
       font-weight="700" text-anchor="middle">
      <rect x="426" y="136" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="446" y="152" fill="#0A0F0D">cs</text>
      <rect x="426" y="174" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="446" y="190" fill="#0A0F0D">cs</text>
      <rect x="426" y="212" width="40" height="22" rx="6" fill="none" stroke="#8A9A93" stroke-width="1.5"/>
      <text x="446" y="228" fill="#8A9A93">s</text>
      <rect x="426" y="250" width="40" height="22" rx="6" fill="none" stroke="#8A9A93" stroke-width="1.5"/>
      <text x="446" y="266" fill="#8A9A93">s</text>
    </g>
  </g>

  <!-- ============ TypeDefinition panel ============ -->
  <g id="type-definition">
    <rect x="632" y="32" width="520" height="284" rx="12" fill="#111815" stroke="#1F2A26"/>
    <g transform="translate(648 48)">
      <rect width="15" height="15" rx="3" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <path d="M5 0V15 M0 5H15" stroke="#00D4AA" stroke-width="1"/>
    </g>
    <text x="672" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Hiragino Kaku Gothic ProN', 'Yu Gothic', 'Meiryo', sans-serif"
          font-size="16" font-weight="600" fill="#E8F5F0">TypeDefinition.xlsx</text>

    <!-- reference types -->
    <rect x="648" y="252" width="500" height="48" fill="#00D4AA" fill-opacity="0.05"/>

    <g stroke="#1F2A26" stroke-width="1">
      <path d="M648 84H1148 M648 108H1148 M648 132H1148 M648 156H1148 M648 180H1148 M648 204H1148 M648 228H1148 M648 252H1148 M648 276H1148 M648 300H1148"/>
      <path d="M648 84V300 M748 84V300 M1010 84V300 M1148 84V300"/>
