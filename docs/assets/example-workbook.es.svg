      <text x="758" y="197" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">iconPath</text>
      <text x="658" y="221" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#E8F5F0">listaEnteros</text>
      <text x="758" y="221" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#8A9A93">intList</text>
      <text x="658" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#E8F5F0">numeroDecimal</text>
      <text x="758" y="245" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#8A9A93">float</text>
      <text x="658" y="269" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#00D4AA">idObjeto</text>
      <text x="752" y="269" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">find_id(GameConfig,Objetos,itemId)</text>
      <text x="658" y="293" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#00D4AA">listaObjetos</text>
      <text x="758" y="293" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">split_list(find_id(&#8230;))</text>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="13" fill="#8A9A93">
