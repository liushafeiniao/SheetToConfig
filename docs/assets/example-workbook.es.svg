      <text x="1008" y="149">alias de string</text>
      <text x="1008" y="173">enumeración de texto</text>
      <text x="1008" y="197">ruta auto-completada</text>
      <text x="1008" y="221">lista de enteros 1-D</text>
      <text x="1008" y="245">alias de float</text>
      <text x="1008" y="269">referencia entre hojas</text>
      <text x="1008" y="293">lista de refs, sep. #</text>
    </g>
  </g>

  <!-- ============ legend strip ============ -->
  <g id="legend" text-anchor="middle"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="600" y="332" font-size="14">
      <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Sheet</tspan><tspan fill="#8A9A93"> — hoja de datos &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">File</tspan><tspan fill="#8A9A93"> — salida, la extensión define el formato &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Platform</tspan><tspan fill="#8A9A93"> — c cliente / s servidor / cs ambos; encabezado opcional</tspan>
    </text>
    <text x="600" y="358" font-size="13" fill="#55665E">TypeDefinition.xlsx reúne cinco hojas; copie Objetos / Recompensas a un libro de negocio para ejecutarlas; itemId conserva el int fijo para exportar IDs simples</text>
  </g>

