    <text x="197" y="438" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="13" font-weight="700" fill="#0A0F0D">物品表</text>

