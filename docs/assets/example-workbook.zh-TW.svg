      <path d="M5 0V15 M0 5H15" stroke="#00D4AA" stroke-width="1"/>
    </g>
    <text x="88" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang TC', 'Microsoft JhengHei', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="16" font-weight="600" fill="#E8F5F0">TypeDefinition.xlsx — 物品表 / 獎勵表 教學分頁</text>

