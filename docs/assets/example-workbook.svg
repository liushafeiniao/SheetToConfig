    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="13" fill="#55665E">
      <text x="99" y="695">&#9312; 字段名</text>
      <text x="78" y="723">&#9313; 类型+约束</text>
      <text x="99" y="753">&#9314; 导出端</text>
      <text x="112" y="779">&#9315; 说明</text>
      <text x="99" y="821">数据行 &#8594;</text>
