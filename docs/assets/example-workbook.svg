<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="892" viewBox="0 0 1200 892"
     role="img" aria-labelledby="title desc">
  <title id="title">SheetToConfig 示例工作簿</title>
  <desc id="desc">示例结构：TypeDefinition.xlsx 集中包含 CODE、Guide、Examples、物品表、奖励表 五个分表；物品表 与 奖励表 是可复制的教学示例，复制到 GameConfig.xlsx 后由业务 CODE 页声明输出。字段名固定英文驼峰，类型使用中文别名（整数、字符串、品质、图标路径、物品ID、物品列表等），itemId 保留固定 int，分表名与字段说明使用中文。</desc>

  <defs>
    <pattern id="cellgrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#E8F5F0" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="892" rx="24" fill="#0A0F0D"/>
  <rect width="1200" height="892" rx="24" fill="url(#cellgrid)"/>

  <!-- ============ CODE worksheet panel ============ -->
  <g id="code-sheet">
    <rect x="48" y="32" width="560" height="284" rx="12" fill="#111815" stroke="#1F2A26"/>
    <g transform="translate(64 48)">
      <rect width="15" height="15" rx="3" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <path d="M5 0V15 M0 5H15" stroke="#00D4AA" stroke-width="1"/>
    </g>
    <text x="88" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="16" font-weight="600" fill="#E8F5F0">复制运行：GameConfig.xlsx — CODE</text>

    <g stroke="#1F2A26" stroke-width="1">
      <path d="M64 90H534 M64 128H534 M64 166H534 M64 204H534 M64 242H534 M64 280H534"/>
      <path d="M64 90V280 M184 90V280 M414 90V280 M534 90V280"/>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
      <text x="76" y="116" font-size="14" font-weight="600" fill="#8A9A93">Sheet</text>
      <text x="196" y="116" font-size="14" font-weight="600" fill="#8A9A93">File</text>
      <text x="426" y="116" font-size="14" font-weight="600" fill="#8A9A93">Platform</text>
      <g font-size="15" fill="#E8F5F0">
        <text x="76" y="154" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">物品表</text>
        <text x="196" y="154">ItemConfig.json</text>
        <text x="76" y="192" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">奖励表</text>
        <text x="196" y="192">RewardConfig.json</text>
        <text x="76" y="230" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">掉落表</text>
        <text x="196" y="230">DropConfig.lua</text>
        <text x="76" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">任务表</text>
        <text x="196" y="268">QuestConfig.pb</text>
      </g>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13"
       font-weight="700" text-anchor="middle">
      <rect x="426" y="136" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="446" y="152" fill="#0A0F0D">cs</text>
      <rect x="426" y="174" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="446" y="190" fill="#0A0F0D">cs</text>
      <rect x="426" y="212" width="40" height="22" rx="6" fill="none" stroke="#8A9A93" stroke-width="1.5"/>
      <text x="446" y="228" fill="#8A9A93">s</text>
      <rect x="426" y="250" width="40" height="22" rx="6" fill="none" stroke="#8A9A93" stroke-width="1.5"/>
      <text x="446" y="266" fill="#8A9A93">s</text>
    </g>
  </g>

  <!-- ============ TypeDefinition panel ============ -->
  <g id="type-definition">
    <rect x="632" y="32" width="520" height="284" rx="12" fill="#111815" stroke="#1F2A26"/>
    <g transform="translate(648 48)">
      <rect width="15" height="15" rx="3" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <path d="M5 0V15 M0 5H15" stroke="#00D4AA" stroke-width="1"/>
    </g>
    <text x="672" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="16" font-weight="600" fill="#E8F5F0">TypeDefinition.xlsx</text>

    <!-- reference types -->
    <rect x="648" y="252" width="500" height="48" fill="#00D4AA" fill-opacity="0.05"/>

    <g stroke="#1F2A26" stroke-width="1">
      <path d="M648 84H1148 M648 108H1148 M648 132H1148 M648 156H1148 M648 180H1148 M648 204H1148 M648 228H1148 M648 252H1148 M648 276H1148 M648 300H1148"/>
      <path d="M648 84V300 M748 84V300 M1010 84V300 M1148 84V300"/>
    </g>

    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="13" font-weight="600" fill="#8A9A93">
      <text x="658" y="100">类型名</text>
      <text x="758" y="100">转换函数</text>
      <text x="1020" y="100">说明 / 示例</text>
    </g>

    <g font-size="13">
      <text x="658" y="125" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#E8F5F0">整数</text>
      <text x="758" y="125" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#8A9A93">int</text>
      <text x="658" y="149" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#E8F5F0">字符串</text>
      <text x="758" y="149" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#8A9A93">string</text>
      <text x="658" y="173" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#00D4AA">品质</text>
      <text x="758" y="173" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">qualityEnum</text>
      <text x="658" y="197" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#00D4AA">图标路径</text>
      <text x="758" y="197" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">iconPath</text>
      <text x="658" y="221" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#E8F5F0">整数列表</text>
      <text x="758" y="221" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#8A9A93">intList</text>
      <text x="658" y="245" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#E8F5F0">浮点数</text>
      <text x="758" y="245" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#8A9A93">float</text>
      <text x="658" y="269" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#00D4AA">物品ID</text>
      <text x="752" y="269" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">find_id(GameConfig,物品表,itemId)</text>
      <text x="658" y="293" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif" fill="#00D4AA">物品列表</text>
      <text x="758" y="293" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">split_list(find_id(&#8230;))</text>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="13" fill="#8A9A93">
      <text x="1020" y="125">整数别名</text>
      <text x="1020" y="149">字符串别名</text>
      <text x="1020" y="173">字符串枚举</text>
      <text x="1020" y="197">自动拼接图标路径</text>
      <text x="1020" y="221">一维整数列表</text>
      <text x="1020" y="245">浮点数别名</text>
      <text x="1020" y="269">跨表引用单值</text>
      <text x="1020" y="293">引用列表，# 分隔</text>
    </g>
  </g>

  <!-- ============ legend strip ============ -->
  <g id="legend" text-anchor="middle"
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
    <text x="600" y="332" font-size="14">
      <tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Sheet</tspan><tspan fill="#8A9A93"> — 数据表名 &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">File</tspan><tspan fill="#8A9A93"> — 输出文件名，扩展名决定格式 &#183; </tspan><tspan font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" fill="#00D4AA">Platform</tspan><tspan fill="#8A9A93"> — c 客户端 / s 服务端 / cs 两端；表头行可省略</tspan>
    </text>
    <text x="600" y="358" font-size="13" fill="#55665E">TypeDefinition.xlsx 集中放置五个分表；物品表 / 奖励表 复制到普通业务工作簿后即可运行；itemId 保留固定 int 以导出纯 ID</text>
  </g>

  <!-- ============ teaching worksheets panel ============ -->
  <g id="data-sheet">
    <rect x="48" y="376" width="1104" height="492" rx="12" fill="#111815" stroke="#1F2A26"/>
    <g transform="translate(64 392)">
      <rect width="15" height="15" rx="3" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <path d="M5 0V15 M0 5H15" stroke="#00D4AA" stroke-width="1"/>
    </g>
    <text x="88" y="406" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="16" font-weight="600" fill="#E8F5F0">TypeDefinition.xlsx — 物品表 / 奖励表 教学分表</text>

    <!-- ===== 物品表 ===== -->
    <rect x="168" y="422" width="58" height="24" rx="6" fill="#00D4AA"/>
    <text x="197" y="438" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="13" font-weight="700" fill="#0A0F0D">物品表</text>

    <rect x="168" y="456" width="640" height="112" fill="#0D1310"/>
    <rect x="678" y="456" width="130" height="168" fill="#00D4AA" fill-opacity="0.05"/>

    <g stroke="#1F2A26" stroke-width="1">
      <path d="M168 456H808 M168 484H808 M168 512H808 M168 540H808 M168 568H808 M168 596H808 M168 624H808"/>
      <path d="M168 456V624 M318 456V624 M538 456V624 M678 456V624 M808 456V624"/>
    </g>

    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="13" fill="#55665E">
      <text x="99" y="475">&#9312; 字段名</text>
      <text x="78" y="503">&#9313; 类型+约束</text>
      <text x="99" y="533">&#9314; 导出端</text>
      <text x="112" y="559">&#9315; 说明</text>
      <text x="99" y="601">数据行 &#8594;</text>
    </g>

    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="15"
       font-weight="600" fill="#E8F5F0">
