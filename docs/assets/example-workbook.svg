      <text x="330" y="475">name</text>
      <text x="550" y="475">quality</text>
      <text x="690" y="475">icon</text>
    </g>
    <g font-size="13" fill="#00D4AA">
      <text x="176" y="503" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">int+unique()</text>
      <text x="326" y="503" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">字符串+required()+unique()</text>
      <text x="546" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">品质</text>
      <text x="686" y="503" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">图标路径</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13"
       font-weight="700" text-anchor="middle">
      <rect x="176" y="517" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="196" y="533" fill="#0A0F0D">CS</text>
      <rect x="326" y="517" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="346" y="533" fill="#0A0F0D">CS</text>
      <rect x="546" y="517" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="566" y="533" fill="#0A0F0D">CS</text>
      <rect x="686" y="517" width="40" height="22" rx="6" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <text x="706" y="533" fill="#00D4AA">C</text>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="14" fill="#8A9A93">
      <text x="180" y="559">唯一物品 ID</text>
      <text x="330" y="559">必填且唯一的显示名</text>
      <text x="550" y="559">枚举三选一</text>
      <text x="690" y="559">仅客户端图标路径</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#E8F5F0">
      <text x="178" y="587">1001</text>
      <text x="328" y="587">Bronze Sword</text>
      <text x="548" y="587">green</text>
      <text x="688" y="587">sword</text>
      <text x="178" y="615">1002</text>
      <text x="328" y="615">Iron Shield</text>
      <text x="548" y="615">blue</text>
      <text x="688" y="615">shield</text>
    </g>

    <!-- ===== 奖励表 ===== -->
    <rect x="168" y="642" width="58" height="24" rx="6" fill="#00D4AA"/>
    <text x="197" y="658" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
          font-size="13" font-weight="700" fill="#0A0F0D">奖励表</text>

    <rect x="168" y="676" width="910" height="112" fill="#0D1310"/>
    <rect x="508" y="676" width="420" height="168" fill="#00D4AA" fill-opacity="0.05"/>
    <rect x="928" y="676" width="150" height="168" fill="#8A9A93" fill-opacity="0.06"/>

    <g stroke="#1F2A26" stroke-width="1">
      <path d="M168 676H1078 M168 704H1078 M168 732H1078 M168 760H1078 M168 788H1078 M168 816H1078 M168 844H1078"/>
      <path d="M168 676V844 M308 676V844 M508 676V844 M708 676V844 M928 676V844 M1078 676V844"/>
