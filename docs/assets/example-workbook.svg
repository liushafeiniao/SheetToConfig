      <text x="320" y="695">primaryItemId</text>
      <text x="520" y="695">itemIds</text>
      <text x="720" y="695">weights</text>
      <text x="940" y="695">rate</text>
    </g>
    <g font-size="13" fill="#00D4AA">
      <text x="176" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">整数+unique()</text>
      <text x="316" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">物品ID+required()</text>
      <text x="516" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">物品列表+len(1,3)</text>
      <text x="716" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">整数列表+equalLen(itemIds)</text>
      <text x="936" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">浮点数+range(0,1)</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13"
       font-weight="700" text-anchor="middle">
      <rect x="176" y="737" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="196" y="753" fill="#0A0F0D">CS</text>
      <rect x="316" y="737" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="336" y="753" fill="#0A0F0D">CS</text>
      <rect x="516" y="737" width="40" height="22" rx="6" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <text x="536" y="753" fill="#00D4AA">C</text>
      <rect x="716" y="737" width="40" height="22" rx="6" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <text x="736" y="753" fill="#00D4AA">C</text>
      <rect x="936" y="737" width="40" height="22" rx="6" fill="none" stroke="#8A9A93" stroke-width="1.5"/>
      <text x="956" y="753" fill="#8A9A93">S</text>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="14" fill="#8A9A93">
      <text x="180" y="779">唯一奖励 ID</text>
      <text x="320" y="779">引用物品表 itemId</text>
      <text x="520" y="779">物品 ID 列表</text>
      <text x="720" y="779">与 itemIds 等长</text>
      <text x="940" y="779">仅服务端闭区间概率</text>
