      <text x="320" y="695">primaryItemId</text>
      <text x="500" y="695">itemIds</text>
      <text x="680" y="695">weights</text>
      <text x="920" y="695">rate</text>
    </g>
    <g font-size="13" fill="#00D4AA">
      <text x="176" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">integer+unique()</text>
      <text x="316" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">itemId+required()</text>
      <text x="496" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">itemList+len(1,3)</text>
      <text x="676" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">integerList+equalLen(itemIds)</text>
      <text x="916" y="723" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">number+range(0,1)</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="13"
       font-weight="700" text-anchor="middle">
      <rect x="176" y="737" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="196" y="753" fill="#0A0F0D">CS</text>
      <rect x="316" y="737" width="40" height="22" rx="6" fill="#00D4AA"/>
      <text x="336" y="753" fill="#0A0F0D">CS</text>
      <rect x="496" y="737" width="40" height="22" rx="6" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <text x="516" y="753" fill="#00D4AA">C</text>
      <rect x="676" y="737" width="40" height="22" rx="6" fill="none" stroke="#00D4AA" stroke-width="1.5"/>
      <text x="696" y="753" fill="#00D4AA">C</text>
      <rect x="916" y="737" width="40" height="22" rx="6" fill="none" stroke="#8A9A93" stroke-width="1.5"/>
      <text x="936" y="753" fill="#8A9A93">S</text>
    </g>
    <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif"
       font-size="14" fill="#8A9A93">
      <text x="180" y="779">Unique reward ID</text>
      <text x="320" y="779">References Item.itemId</text>
      <text x="500" y="779">Item ID list</text>
      <text x="680" y="779">Matches itemIds length</text>
      <text x="916" y="779">Server-only closed range</text>
    </g>
    <g font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" fill="#E8F5F0">
      <text x="178" y="807">1</text>
      <text x="318" y="807">1001</text>
      <text x="498" y="807">1001#1002</text>
      <text x="678" y="807">70#30</text>
      <text x="918" y="807">0.25</text>
      <text x="178" y="835">2</text>
      <text x="318" y="835">1002</text>
      <text x="498" y="835">1002</text>
      <text x="678" y="835">100</text>
      <text x="918" y="835">1.0</text>
    </g>
  </g>
</svg>
